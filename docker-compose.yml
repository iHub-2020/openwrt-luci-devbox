# ==============================================================
#  docker-compose.yml — 单容器版（非通讯类插件开发）
#
#  适用场景：
#    ✅ LuCI UI 插件开发（配置界面、表单、状态展示）
#    ✅ WireGuard 密钥生成 / 二维码
#    ✅ UCI / init.d 脚本逻辑验证
#    ✅ poweroffdevice、状态类、系统管理类插件
#    ❌ 不适合 phantun/udp2raw 等需要真实流量对打的场景
#       → 请改用 docker-compose.dual.yml
#
#  首次启动会自动构建镜像（从官方下载 rootfs.tar.gz，约 5MB）
#  构建完成后镜像缓存在本地，后续启动无需重新构建
# ==============================================================

services:
  openwrt-luci-devbox:
    # 使用本地 Dockerfile 构建，版本锁定为 OpenWrt 24.10.3
    build:
      context: .
      dockerfile: Dockerfile
    image: openwrt-luci-devbox:24.10.3   # 构建后的本地镜像名
    container_name: openwrt-luci-devbox
    hostname: OpenWrt
    restart: unless-stopped
    entrypoint: ["/bin/ash", "/entrypoint.sh"]

    # 网络模式：bridge（容器独立命名空间，NET_ADMIN 不影响宿主机）
    network_mode: bridge

    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW

    devices:
      - /dev/net/tun

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.conf.all.src_valid_mark=1

    # 绑定 127.0.0.1：只允许本机访问
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:2222:22"

    volumes:
      - ./plugins:/luci-plugins
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./docker-init.sh:/docker-init.sh:ro
      - ./init-luci.sh:/init-luci.sh:ro
      - ./config:/config-templates:ro
      - opkg-cache:/var/opkg-lists

    environment:
      - FORCE_REINIT=0

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/cgi-bin/luci/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  opkg-cache:
