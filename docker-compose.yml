# ==============================================================
# 标题: docker-compose.yml
# 作者: reyan
# 日期: 2026-03-08
# 版本: 1.1.0
# 描述: OpenWrt LuCI DevBox 单容器模式编排文件，用于普通 LuCI / WireGuard 页面开发与单机验证。
# 最近三次更新:
#   - 2026-03-08: 增加 SETGID / SETUID 能力，修复 logd 运行态问题。
#   - 2026-03-08: 对齐健康检查与 entrypoint 启动策略。
#   - 2026-03-08: 为后续 dual 模式修复保持同构配置基线。
# ==============================================================
#  docker-compose.yml — 单容器版（非通讯类插件开发）
#
#  适用场景：
#    ✅ LuCI UI 插件开发（配置界面、表单、状态展示）
#    ✅ WireGuard 密钥生成 / 二维码
#    ✅ UCI / init.d 脚本逻辑验证
#    ✅ poweroffdevice、状态类、系统管理类插件
#    ❌ 不适合 phantun/udp2raw 等需要真实流量对打的场景
#       → 请改用 docker-compose.dual.yml
#
#  首次启动会自动构建镜像（从官方下载 rootfs.tar.gz，约 5MB）
#  构建完成后镜像缓存在本地，后续启动无需重新构建
# ==============================================================

services:
  openwrt-luci-devbox:
    # 使用本地 Dockerfile 构建，版本锁定为 OpenWrt 24.10.3
    build:
      context: .
      dockerfile: Dockerfile
    image: openwrt-luci-devbox:24.10.3 # 构建后的本地镜像名
    container_name: openwrt-luci-devbox
    hostname: OpenWrt
    restart: unless-stopped
    entrypoint: [ "/bin/ash", "/entrypoint.sh" ]

    # 网络模式：bridge（容器独立命名空间，NET_ADMIN 不影响宿主机）
    network_mode: bridge

    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SETGID
      - SETUID

    devices:
      - /dev/net/tun

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.conf.all.src_valid_mark=1

    # 绑定 127.0.0.1：只允许本机访问
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:2222:22"

    volumes:
      - ./plugins:/luci-plugins
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./docker-init.sh:/docker-init.sh:ro
      - ./init-luci.sh:/init-luci.sh:ro
      - ./devbox-selfcheck.sh:/devbox-selfcheck.sh:ro
      - ./config:/config-templates:ro
      - opkg-cache:/var/opkg-lists

    environment:
      - FORCE_REINIT=0

    healthcheck:
      test: [ "CMD-SHELL", "/bin/ash /devbox-selfcheck.sh --health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  opkg-cache:
