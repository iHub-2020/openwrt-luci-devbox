# ==============================================================
#  docker-compose.dual.yml — 双容器版（通讯类插件流量验证）
#
#  适用场景：
#    ✅ phantun（TCP 伪装 UDP）端对端流量验证
#    ✅ udp2raw（UDP 伪装 TCP/ICMP）穿透测试
#    ✅ udp-speeder 多倍发包效果验证
#    ✅ WireGuard 伪装插件的真实流量测试
#    ✅ 任何需要"服务端 ↔ 客户端"双向流量的场景
#
#  拓扑结构：
#
#       ┌─────────────────────┐      devnet (172.30.0.0/24)
#       │  openwrt-server     │◄────────────────────────────►
#       │  （路由器/服务端）    │  172.30.0.10              172.30.0.20
#       │  LuCI: :8080        │                    ┌──────────────────┐
#       │  SSH:  :2222        │                    │  openwrt-peer    │
#       │  wg0: 10.10.58.1    │                    │  （对端/客户端）  │
#       └─────────────────────┘                    │  SSH: :2223      │
#                                                  │  wg0: 10.10.58.2 │
#                                                  └──────────────────┘
#
#  使用方法：
#    docker compose -f docker-compose.dual.yml up -d
#
#  进入对端容器调试：
#    docker exec -it openwrt-peer /bin/ash
#    或：ssh root@localhost -p 2223
#
#  在容器间发包测试（以 udp2raw 为例）：
#    # server 容器内：
#    udp2raw -s -l 0.0.0.0:4096 -r 127.0.0.1:51820 -k "passwd" --raw-mode faketcp &
#    # peer 容器内（TARGET_IP 为 server 的 devnet IP）：
#    udp2raw -c -l 0.0.0.0:3333 -r 172.30.0.10:4096 -k "passwd" --raw-mode faketcp &
# ==============================================================

networks:
  devnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1

volumes:
  opkg-cache-server:
  opkg-cache-peer:

# 公共配置（YAML anchor）
x-openwrt-common: &openwrt-common
  build:
    context: .
    dockerfile: Dockerfile
  image: openwrt-luci-devbox:24.10.3
  restart: unless-stopped
  entrypoint: ["/bin/ash", "/entrypoint.sh"]
  cap_drop:
    - ALL
  cap_add:
    - NET_ADMIN
    - NET_RAW
  devices:
    - /dev/net/tun
  sysctls:
    - net.ipv4.ip_forward=1
    - net.ipv6.conf.all.forwarding=1
    - net.ipv4.conf.all.src_valid_mark=1
  volumes:
    - ./entrypoint.sh:/entrypoint.sh:ro
    - ./docker-init.sh:/docker-init.sh:ro
    - ./init-luci.sh:/init-luci.sh:ro
    - ./devbox-selfcheck.sh:/devbox-selfcheck.sh:ro
    - ./config:/config-templates:ro

services:

  openwrt-server:
    <<: *openwrt-common
    container_name: openwrt-server
    hostname: OpenWrt-Server
    networks:
      devnet:
        ipv4_address: 172.30.0.10
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:2222:22"
    volumes:
      - ./plugins:/luci-plugins
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./docker-init.sh:/docker-init.sh:ro
      - ./init-luci.sh:/init-luci.sh:ro
      - ./devbox-selfcheck.sh:/devbox-selfcheck.sh:ro
      - ./config:/config-templates:ro
      - opkg-cache-server:/var/opkg-lists
    environment:
      - FORCE_REINIT=0
      - DEVBOX_ROLE=server
      - WG_ADDR=10.10.58.1/24
      - WG_LISTEN_PORT=51820
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/bin/ash /devbox-selfcheck.sh --health"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  openwrt-peer:
    <<: *openwrt-common
    container_name: openwrt-peer
    hostname: OpenWrt-Peer
    networks:
      devnet:
        ipv4_address: 172.30.0.20
    ports:
      - "127.0.0.1:2223:22"
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./docker-init.sh:/docker-init.sh:ro
      - ./init-luci.sh:/init-luci.sh:ro
      - ./devbox-selfcheck.sh:/devbox-selfcheck.sh:ro
      - ./config:/config-templates:ro
      - opkg-cache-peer:/var/opkg-lists
    environment:
      - FORCE_REINIT=0
      - DEVBOX_ROLE=peer
      - WG_ADDR=10.10.58.2/24
      - WG_SERVER_IP=172.30.0.10
      - WG_LISTEN_PORT=51820
    depends_on:
      openwrt-server:
        condition: service_healthy
